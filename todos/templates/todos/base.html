<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Django To-Do</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #f0f4f8; min-height: 100vh; display: flex; justify-content: center; padding: 40px 16px; }
    .container { width: 100%; max-width: 560px; }
    h1 { font-size: 2rem; color: #1a202c; margin-bottom: 4px; }
    .stats { color: #718096; font-size: 0.9rem; margin-bottom: 24px; }
    .card { background: white; border-radius: 12px; padding: 24px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
    .form-row { display: flex; gap: 8px; margin-bottom: 24px; }
    .form-input { flex: 1; padding: 10px 14px; border: 2px solid #e2e8f0; border-radius: 8px; font-size: 1rem; outline: none; transition: border-color 0.2s; }
    .form-input:focus { border-color: #667eea; }
    .btn { padding: 10px 18px; border: none; border-radius: 8px; cursor: pointer; font-size: 0.9rem; font-weight: 600; transition: all 0.2s; }
    .btn-primary { background: #667eea; color: white; }
    .btn-primary:hover { background: #5a67d8; }
    .btn-success { background: #48bb78; color: white; }
    .btn-success:hover { background: #38a169; }
    .btn-danger { background: #fc8181; color: white; }
    .btn-danger:hover { background: #e53e3e; }
    .btn-ghost { background: #edf2f7; color: #4a5568; }
    .btn-ghost:hover { background: #e2e8f0; }
    .todo-item { display: flex; align-items: center; gap: 12px; padding: 12px 0; border-bottom: 1px solid #f0f4f8; }
    .todo-item:last-child { border-bottom: none; }
    .todo-title { flex: 1; font-size: 1rem; color: #2d3748; }
    .todo-title.done { text-decoration: line-through; color: #a0aec0; }
    .actions { display: flex; gap: 6px; }
    .empty { text-align: center; color: #a0aec0; padding: 24px 0; }
    .checkbox { width: 20px; height: 20px; cursor: pointer; accent-color: #667eea; }
  </style>
</head>
<body>
  <div class="container">
    {% block content %}{% endblock %}
  </div>
</body>
</html>
